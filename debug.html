<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ES Agent · Debug</title>
<style>
  body { background: #020406; color: #c0e0f5; font-family: monospace; padding: 20px; }
  .box { background: #0a1525; border: 1px solid #1e3d5c; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .ok  { color: #00ff9d; }
  .err { color: #ff2755; }
  .warn{ color: #ffb300; }
  h2   { color: #00d4ff; letter-spacing: 3px; font-size: 13px; margin-bottom: 12px; }
  button {
    background: rgba(0,212,255,0.1); border: 1px solid #00d4ff;
    color: #00d4ff; padding: 10px 20px; border-radius: 6px;
    font-family: monospace; font-size: 13px; cursor: pointer; margin-top: 10px;
  }
  input {
    width: 100%; background: #08101a; border: 1px solid #162d45;
    color: #c0e0f5; padding: 10px; border-radius: 6px;
    font-family: monospace; font-size: 12px; margin-bottom: 8px;
  }
  pre { font-size: 11px; line-height: 1.8; white-space: pre-wrap; word-break: break-all; }
  .step { padding: 6px 0; border-bottom: 1px solid #0f2035; }
  .step:last-child { border: none; }
</style>
</head>
<body>

<div style="font-family:monospace;font-size:20px;color:#00d4ff;letter-spacing:4px;margin-bottom:20px;">
  ES AGENT · DEBUG PAGE
</div>

<!-- STEP 1: Basic JS check -->
<div class="box">
  <h2>STEP 1 · JAVASCRIPT CHECK</h2>
  <div id="js-check" class="step warn">Checking...</div>
</div>

<!-- STEP 2: localStorage check -->
<div class="box">
  <h2>STEP 2 · BROWSER STORAGE</h2>
  <div id="ls-check" class="step warn">Checking...</div>
</div>

<!-- STEP 3: Existing API key -->
<div class="box">
  <h2>STEP 3 · SAVED API KEY</h2>
  <div id="key-check" class="step warn">Checking...</div>
  <button onclick="clearKey()">CLEAR SAVED KEY</button>
</div>

<!-- STEP 4: API key input + live test -->
<div class="box">
  <h2>STEP 4 · TEST YOUR API KEY</h2>
  <input type="password" id="api-key-input" placeholder="sk-ant-api03-...">
  <button onclick="testApi()">TEST API CONNECTION</button>
  <div id="api-result" class="step" style="margin-top:10px;display:none;"></div>
</div>

<!-- STEP 5: Live price feed test -->
<div class="box">
  <h2>STEP 5 · LIVE PRICE FEED TEST</h2>
  <button onclick="testPrices()">TEST LIVE PRICES</button>
  <div id="price-result" style="margin-top:10px;"></div>
</div>

<!-- STEP 6: Full error log -->
<div class="box">
  <h2>STEP 6 · ERROR LOG</h2>
  <pre id="error-log">No errors caught yet.</pre>
</div>

<script>
// Catch ALL errors globally
const errors = [];
window.onerror = function(msg, src, line, col, err){
  errors.push(`ERROR: ${msg} | Line: ${line} | ${src}`);
  document.getElementById('error-log').textContent = errors.join('\n');
};
window.onunhandledrejection = function(e){
  errors.push(`PROMISE REJECTION: ${e.reason}`);
  document.getElementById('error-log').textContent = errors.join('\n');
};

// STEP 1: JS works
document.getElementById('js-check').innerHTML = '<span class="ok">✓ JavaScript is working correctly</span>';

// STEP 2: localStorage
try {
  localStorage.setItem('_test', '1');
  localStorage.removeItem('_test');
  document.getElementById('ls-check').innerHTML = '<span class="ok">✓ localStorage is available</span>';
} catch(e) {
  document.getElementById('ls-check').innerHTML = `<span class="err">✗ localStorage blocked: ${e.message}</span>`;
}

// STEP 3: Check saved key
function checkKey(){
  const k = localStorage.getItem('es_agent_api_key');
  const el = document.getElementById('key-check');
  if(k){
    el.innerHTML = `<span class="ok">✓ Saved key found: ${k.substring(0,18)}...</span>`;
    document.getElementById('api-key-input').value = k;
  } else {
    el.innerHTML = '<span class="warn">⚠ No saved key found — enter one in Step 4</span>';
  }
}
checkKey();

function clearKey(){
  localStorage.removeItem('es_agent_api_key');
  document.getElementById('key-check').innerHTML = '<span class="warn">Key cleared. Refresh to test again.</span>';
}

// STEP 4: Test API
async function testApi(){
  const key = document.getElementById('api-key-input').value.trim();
  const el  = document.getElementById('api-result');
  el.style.display = 'block';

  if(!key || !key.startsWith('sk-ant')){
    el.innerHTML = '<span class="err">✗ Invalid key format. Must start with sk-ant</span>';
    return;
  }

  el.innerHTML = '<span class="warn">Testing API connection...</span>';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 20,
        messages: [{ role: 'user', content: 'Reply with just: OK' }]
      })
    });

    const data = await res.json();
    console.log('API response:', data);

    if(data.content && data.content[0]){
      localStorage.setItem('es_agent_api_key', key);
      el.innerHTML = `<span class="ok">✓ API KEY WORKS! Response: "${data.content[0].text}" — Key saved to browser.</span>`;
    } else if(data.error){
      el.innerHTML = `<span class="err">✗ API Error: ${data.error.type} — ${data.error.message}</span>`;
    } else {
      el.innerHTML = `<span class="warn">⚠ Unexpected response: ${JSON.stringify(data)}</span>`;
    }
  } catch(e) {
    el.innerHTML = `<span class="err">✗ Network/CORS error: ${e.message}</span>`;
    errors.push(`API fetch error: ${e.message}`);
    document.getElementById('error-log').textContent = errors.join('\n');
  }
}

// STEP 5: Test price feed
async function testPrices(){
  const el = document.getElementById('price-result');
  el.innerHTML = '<span class="warn">Fetching live prices...</span>';

  const tickers = ['ES=F', '^VIX', 'SPY'];
  const results = [];

  for(const t of tickers){
    try {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(t)}?interval=1m&range=1d`;
      const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
      const r = await fetch(proxy);
      const d = await r.json();
      const body = JSON.parse(d.contents);
      const meta = body.chart.result[0].meta;
      results.push(`<div class="step ok">✓ ${t}: $${meta.regularMarketPrice.toFixed(2)}</div>`);
    } catch(e) {
      results.push(`<div class="step err">✗ ${t}: ${e.message}</div>`);
    }
  }

  el.innerHTML = results.join('');
}

// Auto-run steps on load
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('error-log').textContent = errors.length ? errors.join('\n') : 'No errors — page loaded cleanly ✓';
});
</script>
</body>
</html>
